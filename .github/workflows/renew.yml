name: Katabump Auto Renew

on:
  schedule:
    # 每天 UTC 0点 (北京时间 8点) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read

concurrency:
  group: katabump-auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install --with-deps chrome

    - name: Validate Secrets
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
      run: |
        node - <<'NODE'
        if (!process.env.USERS_JSON) {
          throw new Error('Missing required repository secret: USERS_JSON');
        }
        const users = JSON.parse(process.env.USERS_JSON);
        if (!Array.isArray(users) || users.length === 0) {
          throw new Error('USERS_JSON must be a non-empty JSON array');
        }
        for (const [index, user] of users.entries()) {
          if (!user.username || !user.password) {
            throw new Error(`USERS_JSON item ${index} must include username and password`);
          }
        }
        NODE
      
    - name: Run Renew Script
      env:
        # 将 USERS_JSON 配置在 GitHub Repository Secrets 中
        # 格式: [{"username": "xxx", "password": "xxx"}, ...]
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # 使用 xvfb-run 模拟有头环境运行
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

    - name: Prepare Screenshot Artifact
      if: always()
      run: mkdir -p screenshots

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: screenshots
        path: screenshots/
        if-no-files-found: warn
        retention-days: 7
